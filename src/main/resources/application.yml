# Diese Konfigurationsdatei enthält Einstellungen für die Spring Boot-Anwendung.
# YAML-Format wird verwendet, da es lesbar und hierarchisch ist.
#
# Good Practice: Konfigurationen werden in application.yml zentralisiert, um sie leicht anzupassen
# (z. B. für verschiedene Umgebungen wie Development, Test, Production).
#
# Wichtig zu wissen: Spring Boot lädt diese Datei automatisch und überschreibt Standardwerte.

spring:

  # Aktivierung des Spring-Profils "prod"
  #
  # Good Practice: Durch das explizite Setzen eines aktiven Profils wird sichergestellt, dass die eigene
  # SecurityConfiguration.java (mit den definierten Benutzern "user"/"password" und "admin"/"admin")
  # geladen wird. Dadurch wird die automatische Standard-Sicherheitskonfiguration von Spring Boot
  # überschrieben und die eigenen Test-Benutzer sind immer verfügbar.
  #
  # Wichtig zu wissen: Spring Boot verwendet standardmäßig das Profil "default". Die Annotation
  # @Profile("prod") in der SecurityConfiguration sorgt dafür, dass diese Klasse nur bei aktivem
  # "prod"-Profil geladen wird. Ohne diese Zeile würde Spring Boot einen zufälligen Benutzer mit
  # generiertem Passwort verwenden.
  profiles:
    active: prod

  # Konfiguration der Datenquelle (Datenbank-Verbindung).
  # Good Practice: Eine In-Memory-Datenbank wie H2 für Entwicklung verwenden, um echte Datenbanken
  # nicht zu belasten. In Production auf eine persistente DB wie PostgreSQL umstellen.
  # Wichtig zu wissen: 'datasource' definiert, wie die App mit der DB kommuniziert.
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: password

  # JPA (Jakarta Persistence API) Einstellungen für ORM (Object-Relational Mapping).
  # Good Practice: 'ddl-auto: update' lässt Hibernate die DB-Schemata automatisch aktualisieren.
  # Wichtig zu wissen: JPA mappt Java-Klassen (Entities) zu DB-Tabellen.
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  # H2-Konsole aktivieren für DB-Inspektion im Browser.
  # Good Practice: Nur in Development aktivieren; in Production deaktivieren.
  # Wichtig zu wissen: Die Konsole ist unter http://localhost:8080/h2-console erreichbar.
  h2:
    console:
      enabled: true
      path: /h2-console
  web:
    error:
      include-message: always

# Server-spezifische Einstellungen.
# Good Practice: Port und Fehlerhandhabung anpassen.
# Wichtig zu wissen: Der Server läuft standardmäßig auf Port 8080.
server:
  port: 8080

# Springdoc für Swagger-UI (API-Dokumentation).
# Good Practice: API-Docs automatisch generieren.
# Wichtig zu wissen: Swagger-UI zeigt alle Endpoints interaktiv an unter /swagger-ui.html.
springdoc:
  swagger-ui:
    path: /swagger-ui.html